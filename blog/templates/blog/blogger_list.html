{% extends 'base.html' %}
{% load i18n %}

{% block content %}
    {% if bloggers %}
        <ul>
            {% for blogger in bloggers %}
                <li><a href="{% url 'blog:blogger-detail' pk=blogger.pk %}">{{ blogger.username }} ({{ blogger.blogpost_count }})</a></li>
            {% endfor %}
        </ul>
    {% else %}
        <p>{% trans 'There are no bloggers.' %}</p>
    {% endif %}
{% endblock %}
