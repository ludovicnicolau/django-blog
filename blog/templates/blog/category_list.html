{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans 'Categories' %}{% endblock %}

{% block content %}
    <ul class="d-flex gap-2 list-unstyled">
        {% for category in categories %}
            <li class="border rounded-pill p-2"><a class="text-decoration-none link-dark" href="{{ category.get_absolute_url }}">{{ category.name }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
