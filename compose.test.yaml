services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=testdb
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog:
    depends_on:
      db:
        condition: service_healthy
        restart: true
    image: blog
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=testdb
    command: ["sh", "-c", "sleep 30 && python manage.py collectstatic --noinput --clear && python manage.py migrate --noinput && python manage.py test"]
    ports:
      - 8000:8000