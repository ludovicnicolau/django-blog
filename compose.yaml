services:
  db:
    image: postgres:17
    env_file:
      - ./.env
    ports:
      - 5432:5432
    volumes:
      - blog_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  blog:
    depends_on:
      db:
        condition: service_healthy
        restart: true
    image: blog
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - ./.env
    volumes:
      - static_volume:/app/staticfiles
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public_certificate.pem:/etc/nginx/ssl/cert.pem:ro
      - ./private_key.pem:/etc/nginx/ssl/key.pem:ro
      - static_volume:/var/www/static
    restart: unless-stopped

volumes:
  blog_postgres:
  static_volume: