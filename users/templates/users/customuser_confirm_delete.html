{% extends 'base.html' %}
{% load i18n %}

{% block content %}
    <p>
        {% blocktrans with username=user.username %}
            Are you sure you want to delete your account <span class="fw-bold">{{ username }}</span>?
        {% endblocktrans %}
    </p>

    <form method="post">
        {% csrf_token %}
        <input class="btn btn-danger" type="submit" value="{% trans 'Delete my account' %}">
    </form>
{% endblock %}
