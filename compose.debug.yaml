services:
  db:
    image: postgres:17
    env_file:
      - ./.env.debug
    environment:
      - POSTGRES_USER=bloguser
    ports:
      - 5432:5432
    volumes:
      - blog_postgres_debug:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog:
    depends_on:
      db:
        condition: service_healthy
        restart: true
    image: blog
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/app
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000 --nothreading"]
    env_file:
      - ./.env.debug
    ports:
      - 8000:8000
      - 5678:5678
  
volumes:
  blog_postgres_debug: